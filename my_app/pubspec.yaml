name: my_app
description: Camera-based Flutter app to count solar plant hardware using TFLite, with offline SQLite logs, Firebase sync, and Excel export.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.10.5+9

  tflite_flutter: ^0.10.4

  image: ^4.1.7

  sqflite: ^2.3.2

  path_provider: ^2.1.2

  path: ^1.9.0

  firebase_core: ^2.32.0

  cloud_firestore: ^4.17.5

  connectivity_plus: ^5.0.2

  syncfusion_flutter_xlsio: ^25.1.41
  share_plus: ^7.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  shared_preferences: ^2.2.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  # WHY: Catches common Flutter mistakes at compile time
  flutter_lints: ^3.0.0

  # WHY: Easily set a custom app icon from a single image file
  flutter_launcher_icons: ^0.13.1

# --- App icon config ---
# After adding your icon image, run:
# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    # WHY: Register the TFLite model so Flutter can access it at runtime
    - assets/models/
    # WHY: Register image assets (logo, placeholders)
    - assets/images/

  # Uncomment and add custom fonts here if needed later
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500