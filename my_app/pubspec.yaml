name: my_app
description: Camera-based Flutter app to count solar plant hardware using TFLite, with offline SQLite logs, Firebase sync, and Excel export.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Camera ---
  # WHY: Access the phone camera for photo capture and live feed
  camera: ^0.10.5+9

  # --- TFLite ---
  # WHY: Load and run the .tflite model on-device to get item count
  tflite_flutter: ^0.10.4

  # --- Image processing ---
  # WHY: Resize and decode images before passing them to TFLite
  image: ^4.1.7

  # --- Local storage ---
  # WHY: SQLite database so the app works fully offline
  sqflite: ^2.3.2

  # WHY: Find the correct directory on the phone to store the database file
  path_provider: ^2.1.2

  # WHY: Join file paths correctly across Android and iOS
  path: ^1.9.0

  # --- Firebase ---
  # WHY: Required base package — every Firebase feature needs this
  firebase_core: ^2.27.1

  # WHY: Firestore cloud database for syncing logs across devices
  cloud_firestore: ^4.15.9

  # --- Connectivity ---
  # WHY: Check if the device is online before attempting Firebase sync
  connectivity_plus: ^5.0.2

  # --- Excel export ---
  # WHY: Generate .xlsx Excel files from log data for site managers
  syncfusion_flutter_xlsio: ^25.1.41

  # WHY: Share the generated Excel file via WhatsApp, email, etc.
  share_plus: ^7.2.2

  # --- State management ---
  # WHY: Share data (current user, logs) between screens without messy callbacks
  provider: ^6.1.2

  # --- Utilities ---
  # WHY: Format dates as dd/MM/yyyy for display and Excel export
  intl: ^0.19.0

  # WHY: Generate unique IDs for each log entry
  uuid: ^4.3.3

  # Default Flutter icon package (keep this)
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # WHY: Catches common Flutter mistakes at compile time
  flutter_lints: ^3.0.0

  # WHY: Easily set a custom app icon from a single image file
  flutter_launcher_icons: ^0.13.1

# --- App icon config ---
# After adding your icon image, run:
# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    # WHY: Register the TFLite model so Flutter can access it at runtime
    - assets/models/
    # WHY: Register image assets (logo, placeholders)
    - assets/images/

  # Uncomment and add custom fonts here if needed later
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500